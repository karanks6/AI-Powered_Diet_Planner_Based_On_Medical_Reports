<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Diet Planner based on Medical Report</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Custom Config -->
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: "#5EC576",
          accent: "#49A6E9",
          muted: "#6B7280",
          surface: "#F6FFF7",     /* soft green surface */
          "surface-2": "#F1F8FF",  /* soft blue surface */
          "soft-card": "#F7FBF9",  /* card background */
        },
        fontFamily: {
          sans: ["Poppins", "sans-serif"],
        },
        boxShadow: {
          soft: "0 10px 25px rgba(13, 38, 59, 0.06)",
          "soft-strong": "0 18px 40px rgba(13,38,59,0.08)",
        },
      },
    },
  };
</script>


  <!-- Bootstrap icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { font-family: 'Poppins', sans-serif; background: linear-gradient(180deg,#f3fcf7 0%, #eef8ff 100%); color: #0f172a; }
    nav { background: linear-gradient(90deg, rgba(94,197,118,0.08), rgba(73,166,233,0.06)); backdrop-filter: blur(6px); }
    .nav-link { color: #0f172a; }
    .glass-card { background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.55)); border-radius: 16px; box-shadow: 0 10px 30px rgba(15,23,42,0.06); border: 1px solid rgba(15,23,42,0.04); }
    .muted { color: #4b5563; }
    footer { background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.5)); }
    .btn-primary { background: linear-gradient(90deg,#5EC576,#49A6E9); color: #fff; }
  </style>
</head>

<body class="antialiased">
  <!-- NAV -->
  <nav class="sticky top-0 z-50">
    <div class="container mx-auto px-6 py-3 flex items-center justify-between">
      <a href="{{ url_for('index') }}" class="flex items-center gap-3">
        <div class="rounded-lg w-11 h-11 flex items-center justify-center bg-gradient-to-r from-primary to-accent text-white shadow-soft">
          🥗
        </div>
        <div>
          <div class="text-lg font-semibold">Diet Planner based on Medical Report</div>
          <div class="text-xs muted">Personalized from medical reports</div>
        </div>
      </a>

      <div class="hidden md:flex items-center gap-6 text-sm font-medium">
        <a href="{{ url_for('index') }}" class="nav-link hover:text-primary transition">Home</a>
        <a href="{{ url_for('analyze_report') }}" class="nav-link hover:text-primary transition">Analyze</a>
        <a href="{{ url_for('results') }}" class="nav-link hover:text-primary transition">Results</a>
        
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="pt-2 pb-12">
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer class="py-2 mt-2 border-t border-transparent">
    <div class="container mx-auto text-center text-sm muted px-6">
       AI-Powered Diet Planner • Built with Flask & Tailwind
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
  <script> AOS.init({ duration: 800, once: true }); </script>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
